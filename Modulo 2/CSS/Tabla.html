<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billboard</title>
    <link rel="stylesheet" href="Tabla.css">
</head>

<body>

    <div class="header">
        <h1>Billboard Hot 100™</h1>
        <p>WEEK OF FEBRUARY 10, 2024</p>
    </div>

    <table>

        <thead>
            <tr>
                <th>#</th>
                <th>Cover</th>
                <th>Song</th>
                <th>Award</th>
                <th>Last Week</th>
                <th>Peak</th>
                <th>Weeks</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td class="rank">1</td>
                <td class="cover">
                    <div class="img-container">
                        <img src="https://upload.wikimedia.org/wikipedia/en/e/e6/The_Weeknd_-_Blinding_Lights.png">
                    </div>
                </td>
                <td>
                    <strong>Blinding Lights</strong><br>
                    The Weeknd
                </td>
                <td class="award">⭐</td>
                <td>2</td>
                <td>6</td>
                <td>10</td>
            </tr>

            <tr>
                <td class="rank">2</td>
                <td class="cover">
                    <div class="img-container">
                        <img src="https://upload.wikimedia.org/wikipedia/en/f/f5/Dua_Lipa_-_Future_Nostalgia_%28Official_Album_Cover%29.png">
                    </div>
                </td>
                <td>
                    <strong>Levitating</strong><br>
                    Dua Lipa
                </td>
                <td class="award"></td>
                <td>8</td>
                <td>1</td>
                <td>8</td>
            </tr>

            <tr>
                <td class="rank">3</td>
                <td class="cover">
                    <div class="img-container">
                        <img src="https://upload.wikimedia.org/wikipedia/en/4/4f/The_Kid_Laroi_and_Justin_Bieber_-_Stay.png">
                    </div>
                </td>
                <td>
                    <strong>Stay</strong><br>
                    The Kid LAROI
                </td>
                <td class="award"></td>
                <td>7</td>
                <td>1</td>
                <td>7</td>
            </tr>
        </tbody>

    </table>

</body>
</html>
